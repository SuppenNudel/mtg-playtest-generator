<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Playtest Card Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🃏 MTG Playtest Card Generator</h1>
        
        <div class="section">
            <h2>1. Card List</h2>
            <textarea id="cardList" placeholder="Enter card names with quantities, one per line:&#10;4 Lightning Bolt&#10;2 Counterspell&#10;1 Black Lotus" rows="10"></textarea>
        </div>

        <div class="section">
            <h2>2. Language Selection</h2>
            <select id="langCode">
                <option value="de-de">German (de-de)</option>
                <option value="en-us">English (en-us)</option>
                <option value="es-es">Spanish (es-es)</option>
                <option value="fr-fr">French (fr-fr)</option>
                <option value="it-it">Italian (it-it)</option>
                <option value="ja-jp">Japanese (ja-jp)</option>
                <option value="ko-kr">Korean (ko-kr)</option>
                <option value="pt-br">Portuguese (pt-br)</option>
                <option value="ru-ru">Russian (ru-ru)</option>
                <option value="zh-cn">Chinese Simplified (zh-cn)</option>
            </select>
        </div>

        <div class="section">
            <h2>3. Download Card Images</h2>
            <button id="downloadImages" class="btn btn-primary">Download Images from Gatherer</button>
            <div id="downloadProgress" class="progress-container"></div>
        </div>

        <div class="section">
            <h2>4. Generate PDF</h2>
            <button id="generatePdf" class="btn btn-success" disabled>Generate Playtest PDF</button>
            <div id="pdfProgress" class="progress-container"></div>
        </div>

        <div id="imagePreview" class="image-gallery"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
